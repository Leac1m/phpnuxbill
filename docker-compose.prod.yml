services:
  caddy:
    image: caddy:latest
    container_name: nuxbill-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    networks:
      - nuxbill-net
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: nuxbill-app
    environment:
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - ./:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - nuxbill-net
    restart: unless-stopped

  mariadb:
    image: mariadb:10.11
    container_name: nuxbill-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./install/phpnuxbill.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nuxbill-net
    restart: unless-stopped

  cron:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: nuxbill-cron
    environment:
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - ./:/var/www/html
    command: >
      sh -c "cd /var/www/html/system && while true; do php cron.php; sleep 120; done"
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - nuxbill-net
    restart: unless-stopped

  wireguard:
    build:
      context: ./wireguard-api
    container_name: nuxbill-wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - API_TOKEN=super_secret_token_change_me
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - SERVERURL=auto # Auto-detects the host public IP
      - SERVERPORT=51820
      - PEERS=1 # Auto-generates configuration for 1 peer (peer1)
      - PEERDNS=auto
      - INTERNAL_SUBNET=10.66.66.0/24
      - ALLOWEDIPS=0.0.0.0/0
      - LOG_CONFS=true
    volumes:
      - wireguard_data:/config
      - /lib/modules:/lib/modules # Required for wireguard kernel module
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - nuxbill-net
    restart: unless-stopped

volumes:
  caddy_data:
  mariadb_data:
  wireguard_data:

networks:
  nuxbill-net:
    driver: bridge
